name: Deploy to Cloudflare Pages

# Auto-deploys the built site to the `waev-blog` Pages project on every push
# to main. Requires two repo secrets (Settings → Secrets and variables →
# Actions):
#   CLOUDFLARE_API_TOKEN  — token with "Cloudflare Pages: Edit" permission
#   CLOUDFLARE_ACCOUNT_ID  — your account id (CLOUDFLARE_ACCOUNT_ID)
# Until those exist, the deploy step is skipped (the build still runs as a check).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Deploy to Cloudflare Pages
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name waev-blog
