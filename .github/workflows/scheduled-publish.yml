name: Scheduled publish

# Rebuilds and redeploys the blog once a day so that posts whose `date` has
# arrived (see src/lib/posts.ts) go live automatically — no manual step.
# Future-dated posts stay hidden until their calendar slot.
#
# Requires the same repo secrets as deploy.yml:
#   CLOUDFLARE_API_TOKEN  — token with "Cloudflare Pages: Edit"
#   CLOUDFLARE_ACCOUNT_ID  — the Cloudflare account id
# Until those exist the build still runs as a check; the deploy step is skipped.

on:
  schedule:
    # 13:00 UTC daily (~06:00 PT). Adjust if you want a different publish hour.
    - cron: "0 13 * * *"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Deploy to Cloudflare Pages
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name waev-blog
