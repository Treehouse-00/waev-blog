name: Growth OS — weekly SEO audit

# Triggers the Growth OS weekly seo-auditor loop via an Oz cloud agent.
# This is the GitHub-Action variant of the `oz schedule` described in
# growth/RUNBOOK.md — use one trigger per loop (this OR the oz schedule) to
# avoid duplicate PRs.
#
# The agent only PROPOSES: it reads growth/briefs/seo-auditor.md, runs the
# audit, and opens a PR (or writes a report). It never deploys — the existing
# scheduled-publish.yml ships merged posts.
#
# Requires repo secret:
#   WARP_API_KEY  — Oz API key (Warp settings -> Platform)
# Optional repo variable:
#   WARP_AGENT_PROFILE  — agent profile id

on:
  schedule:
    # 14:00 UTC every Tuesday (~06:00 PT). Mirrors CADENCE.md §3.3 (weekly seo-auditor).
    - cron: "0 14 * * 2"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  seo-auditor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: warpdotdev/oz-agent-action@main
        id: agent
        with:
          prompt: |
            Read growth/briefs/seo-auditor.md and execute it.
            Follow the Growth OS invariants: PROPOSE changes via a pull
            request only — never deploy and never post to external
            communities. Use the `gh` CLI to open the PR.
          warp_api_key: ${{ secrets.WARP_API_KEY }}
          profile: ${{ vars.WARP_AGENT_PROFILE || '' }}

      - name: Agent output
        if: ${{ steps.agent.outputs.agent_output }}
        run: echo "${{ steps.agent.outputs.agent_output }}"
