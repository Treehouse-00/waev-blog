# Waev Growth OS — Editorial & SEO Calendar (the WHEN layer)
#
# Purpose: the single structured backlog the scheduled run-system reads to
# decide what content/SEO work to propose next. An autonomous agent picks the
# next entry whose slot_date is due, opens the referenced brief, executes it,
# and PROPOSES the result via PR/report. Agents NEVER deploy and NEVER post to
# external communities autonomously (see ../AGENT.md Invariants and ./CADENCE.md).
#
# This file is the source of truth for *dated* slots. Cron-driven recurring
# loops (weekly link/competitor sweeps, daily publish rebuild, etc.) are
# governed by ./CADENCE.md and are intentionally NOT enumerated per-week here
# to avoid drift — only their monthly/quarterly checkpoints are seeded below.
#
# ───────────────────────────────────────────────────────────────────────────
# ENTRY SCHEMA (verbatim keys). Every entry carries the core keys below; every
# `type: post` entry ALSO carries `bucket` + `theme` — the editorial rails (see
# ./EDITORIAL.md). Non-post entries (audit | seo-task) omit bucket/theme.
#   slot_date        YYYY-MM-DD          when the agent should act on this slot
#   type             post | seo-task | audit
#   segment          tinkerer | ham | cert-emcomm | off-grid
#   funnel_stage     awareness | evaluation | adoption
#   bucket           [post only] primer | signal | field-manual | under-the-hood | position | dispatch
#   theme            [post only] knowing-over-guessing | power-of-refusal | own-your-ground | ready-before-it-matters | earned-competence | networks-of-people
#   series           [post only, optional] the series slug this slot belongs to (see ./EDITORIAL.md), e.g. measure-your-mesh
#   primary_keyword  the single target query (for non-post types: the work focus)
#   secondary_keyword one supporting query/term
#   status           proposed | scheduled | drafted | published
#   brief            relative path to a growth/briefs/*.md file
#
# STATUS SEMANTICS (machine rules):
#   scheduled  = a real post already committed to src/content/blog (date-gated).
#   proposed   = a planned slot the content-writer agent should draft into a PR.
#   drafted    = a draft PR is open and awaiting human merge (the publish gate).
#   published  = merged to main and past its date gate (live on blog.waev.app).
#
# SEGMENT / FUNNEL derivation for the seeded real posts is recorded inline.
# ───────────────────────────────────────────────────────────────────────────

# ===========================================================================
